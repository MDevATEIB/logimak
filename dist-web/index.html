<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LOGIMAK - Démo en ligne du logiciel de gestion commerciale moderne pour commerçants et PME" />
    <meta name="keywords" content="logiciel, gestion, commercial, vente, stock, facture, Tchad, Afrique" />
    <title>LOGIMAK - Démonstration en ligne</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      }
      
      /* Bannière de démo */
      .demo-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 20px;
        text-align: center;
        z-index: 10000;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      
      .demo-banner-content {
        display: flex;
        align-items: center;
        gap: 15px;
        flex: 1;
        justify-content: center;
      }
      
      .demo-icon {
        font-size: 24px;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      
      .demo-text {
        font-size: 14px;
        font-weight: 500;
      }
      
      .demo-text strong {
        font-weight: 700;
      }
      
      .demo-buttons {
        display: flex;
        gap: 10px;
      }
      
      .demo-button {
        padding: 8px 16px;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      
      .demo-button:hover {
        background: rgba(255,255,255,0.3);
        transform: translateY(-1px);
      }
      
      .demo-button.primary {
        background: white;
        color: #667eea;
      }
      
      .demo-button.primary:hover {
        background: #f0f0f0;
      }
      
      /* Décalage du contenu pour la bannière */
      #root {
        margin-top: 70px;
        min-height: calc(100vh - 70px);
      }
      
      @media (max-width: 768px) {
        .demo-banner {
          flex-direction: column;
          padding: 10px;
        }
        
        .demo-text {
          font-size: 12px;
        }
        
        .demo-buttons {
          width: 100%;
          justify-content: center;
        }
        
        #root {
          margin-top: 140px;
          min-height: calc(100vh - 140px);
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/main-C0ph4nqW.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-B9fpQZpG.css">
  </head>
  <body>
    <!-- Bannière de démonstration -->
    <div class="demo-banner">
      <div class="demo-banner-content">
        <span class="demo-icon">🎯</span>
        <div class="demo-text">
          <strong>MODE DÉMONSTRATION</strong> - Toutes les fonctionnalités sont disponibles. Vos données sont stockées localement dans votre navigateur.
        </div>
      </div>
      <div class="demo-buttons">
        <button class="demo-button" onclick="resetDemo()">🔄 Réinitialiser</button>
        <button class="demo-button" onclick="loadDemoData()">📦 Charger données exemple</button>
        <a href="#download" class="demo-button primary">⬇️ Télécharger l'application</a>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Fonctions pour la bannière de démo
      function resetDemo() {
        if (confirm('Voulez-vous réinitialiser toutes les données de démonstration ?')) {
          localStorage.removeItem('logimak_web_demo');
          window.location.reload();
        }
      }
      
      function loadDemoData() {
        if (confirm('Charger les données de démonstration ? Cela remplacera vos données actuelles.')) {
          // Simuler un clic sur le bouton de chargement des données
          // Le vrai chargement se fera via l'app React
          window.dispatchEvent(new CustomEvent('load-demo-data'));
        }
      }
    </script>
    
  </body>
</html>
